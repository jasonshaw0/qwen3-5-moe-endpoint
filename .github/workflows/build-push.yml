name: Build & Push to GHCR

# Uses GitHub Container Registry (ghcr.io) — zero extra setup.
# The built-in GITHUB_TOKEN handles authentication automatically.

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "entrypoint.sh"
      - ".github/workflows/build-push.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: qwen3-5-moe-vllm

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image URL
        run: |
          echo "Image: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"
